<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D78E;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A88A2B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5D78E;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="94" stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.6"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="86" stroke="url(#goldGrad)" stroke-width="0.6" opacity="0.3"/>

  <!-- Arrow motif – diagonal sweeping line -->
  <path d="M 44 140 Q 100 60 160 52" stroke="url(#goldGrad2)" stroke-width="2.5" stroke-linecap="round" opacity="0.55" fill="none"/>
  <!-- Arrow tip -->
  <polygon points="160,52 148,58 155,68" fill="url(#goldGrad)" opacity="0.7"/>

  <!-- 3M lettering -->
  <text
    x="100" y="108"
    text-anchor="middle"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="52"
    font-weight="700"
    letter-spacing="-1"
    fill="url(#goldGrad)"
    filter="url(#glow)"
  >3M</text>

  <!-- DRIVE sub-text -->
  <text
    x="100" y="134"
    text-anchor="middle"
    font-family="'Arial', sans-serif"
    font-size="13"
    font-weight="300"
    letter-spacing="6"
    fill="url(#goldGrad)"
    opacity="0.85"
  >DRIVE</text>

  <!-- Decorative dots flanking DRIVE -->
  <circle cx="46" cy="130" r="1.5" fill="#D4AF37" opacity="0.5"/>
  <circle cx="154" cy="130" r="1.5" fill="#D4AF37" opacity="0.5"/>

  <!-- Bottom tagline -->
  <text
    x="100" y="155"
    text-anchor="middle"
    font-family="'Arial', sans-serif"
    font-size="6.5"
    font-weight="400"
    letter-spacing="3.5"
    fill="#D4AF37"
    opacity="0.55"
  >VTC · TOULOUSE</text>
</svg>
